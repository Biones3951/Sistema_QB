<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QB Home Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0D9EA9;
            --primary-dark: #0891B2;
            --secondary: #0F172A;
            --background: #F8FAFC;
            --surface: #FFFFFF;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --text-muted: #94A3B8;
            --border: #E2E8F0;
            --error: #EF4444;
            --success: #10B981;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }
        .login-card {
            background: white;
            border-radius: 1rem;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            justify-content: center;
        }
        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #0D9EA9 0%, #06B6D4 100%);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
        }
        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0F172A;
        }
        .logo-text span {
            display: block;
            font-size: 0.625rem;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0F172A;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .subtitle {
            color: #64748B;
            text-align: center;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #0F172A;
            margin-bottom: 0.5rem;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid #E2E8F0;
            border-radius: 0.5rem;
            font-size: 0.9375rem;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #0D9EA9;
            box-shadow: 0 0 0 3px rgba(13, 158, 169, 0.1);
        }
        .btn {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #0D9EA9 0%, #06B6D4 100%);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(13, 158, 169, 0.3);
        }
        .error {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            color: #DC2626;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #64748B;
            text-decoration: none;
            font-size: 0.875rem;
        }
        .back-link:hover {
            color: #0D9EA9;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">Q</div>
                <div class="logo-text">QB Home<span>Administrativo</span></div>
            </div>
            <h1>Acesso Restrito</h1>
            <p class="subtitle">Digite suas credenciais para acessar o painel administrativo</p>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="error">{{ message }}</div>
                {% endfor %}
            {% endif %}
            
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" placeholder="Seu usuário admin" required>
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Sua senha" required>
                </div>
                <button type="submit" class="btn">Entrar</button>
            </form>
            
            <a href="/" class="back-link">← Voltar para o site</a>
        </div>
    </div>
</body>
</html>
